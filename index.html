<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Bài tập Tiếng Anh</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --kids: #ff7675;
            --ielts: #6c5ce7;
            --bg: #f0f2f5;
        }
        body { font-family: 'Arial', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        
        /* Container chính */
        .main-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        
        /* Giao diện chọn lớp */
        .class-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .class-card { 
            background: white; padding: 40px 20px; text-align: center; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 24px; font-weight: bold; color: var(--primary);
        }
        .class-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .card-b1 { border-bottom: 8px solid #55efc4; }
        .card-b2 { border-bottom: 8px solid #81ecec; }
        .card-kids { border-bottom: 8px solid var(--kids); }
        .card-ielts { border-bottom: 8px solid var(--ielts); }

        /* Danh sách bài tập */
        #exercise-list { display: none; margin-top: 20px; }
        .exercise-item { 
            background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        /* Nút bấm */
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-back { background: #636e72; color: white; margin-bottom: 20px; }
        .btn-start { background: var(--accent); color: white; }

        /* Form tên học sinh */
        #login-screen { text-align: center; padding: 50px; }
        input[type="text"] { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>
    <h1>TUWAII'S HOMEWORK AREA</h1>
</header>

<div class="main-container">
    <div id="login-screen">
        <h2>Welcome! Please enter your name:</h2>
        <input type="text" id="student-name" placeholder="Example: Nguyễn Văn A">
        <button class="btn btn-start" onclick="showClasses()">Let's start!</button>
    </div>

    <div id="class-selection" style="display:none;">
        <button class="btn btn-back" onclick="location.reload()">← Back</button>
        <h2>Choose your class or the level you want to practice</h2>
        <div class="class-grid">
            <div class="class-card card-b1" onclick="showExercises('B1')">Extra B1</div>
            <div class="class-card card-b2" onclick="showExercises('B2')">Extra B2</div>
            <div class="class-card card-kids" onclick="showExercises('KIDS')">KIDS</div>
        </div>
    </div>

    <div id="exercise-list">
        <button class="btn btn-back" onclick="backToClasses()">← Chọn lớp khác</button>
        <h2 id="selected-class-title">Danh sách bài tập</h2>
        <div id="list-content">
            </div>
    </div>
</div>

<script>
    let studentName = "";
    let currentClass = "";

    const exercisesData = {
        'B1': [
            { title: 'Reading Test 1', url: 'Reading B1.1.html' },
            { title: 'Vocabulary Unit 1', url: '#' }
        ],
        'IELTS': [
            { title: 'IELTS Reading Actual Test', url: '#' },
            { title: 'Listening Practice 1', url: '#' }
        ]
        // Thêm các lớp khác tương tự
    };

    function showClasses() {
        studentName = document.getElementById('student-name').value;
        if (!studentName) return alert("Vui lòng nhập tên!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('class-selection').style.display = 'block';
    }

    function showExercises(className) {
        currentClass = className;
        document.getElementById('class-selection').style.display = 'none';
        document.getElementById('exercise-list').style.display = 'block';
        document.getElementById('selected-class-title').innerText = "Bài tập lớp " + className;
        
        const list = document.getElementById('list-content');
        list.innerHTML = "";
        
        const tasks = exercisesData[className] || [];
        tasks.forEach(task => {
            list.innerHTML += `
                <div class="exercise-item">
                    <span>${task.title}</span>
                    <button class="btn btn-start" onclick="startTask('${task.url}', '${task.title}')">Làm bài</button>
                </div>
            `;
        });
    }

    function startTask(url, title) {
        if(url === '#') return alert("Bài tập này đang được cập nhật!");
        // Lưu thông tin vào bộ nhớ để bài tập có thể lấy được
        sessionStorage.setItem('studentName', studentName);
        sessionStorage.setItem('className', currentClass);
        sessionStorage.setItem('taskTitle', title);
        window.location.href = url;
    }

    function backToClasses() {
        document.getElementById('exercise-list').style.display = 'none';
        document.getElementById('class-selection').style.display = 'block';
    }
</script>

</body>
</html>
