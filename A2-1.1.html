<script>
    const studentName = sessionStorage.getItem('studentName') || "Học sinh ẩn danh";
    const className = sessionStorage.getItem('className') || "Chưa rõ lớp";
    const taskTitle = sessionStorage.getItem('taskTitle') || "Reading 1";
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbyWB-EKtC3yxDAgjDcZhyJT6DRZYgKnNt0o3CendYaoXCd6-O68q78fG5EI9qhlxavZZQ/exec';

    const data = {
        vocab: {
            ex1: [
                { q: "1. The view from the walkway was spectacular.", options: ["noisy", "beautiful", "difficult"], ans: "B" },
                { q: "2. Kew Gardens has a rich biodiversity of plants and animals.", options: ["variety", "colour", "danger"], ans: "A" },
                { q: "3. Butterflies interact with plants in many ways.", options: ["fly", "grow", "work together"], ans: "C" },
                { q: "4. There was a sound installation inside the Palm House.", options: ["display", "ticket", "garden"], ans: "A" },
                { q: "5. We visited an outdoor photography exhibition.", options: ["show", "lesson", "shop"], ans: "A" },
                { q: "6. Children can discover new things in the play area.", options: ["find", "carry", "build"], ans: "A" },
                { q: "7. Visitors can take a guided tour of the gardens.", options: ["short", "led", "quiet"], ans: "B" },
                { q: "8. The Park and Ride system helps reduce traffic congestion.", options: ["movement", "crowding", "accident"], ans: "B" },
                { q: "9. Please park your scooter in the allocated space.", options: ["correct", "empty", "special"], ans: "A" },
                { q: "10. Gareth wants to do voluntary work during summer.", options: ["unpaid", "easy", "indoor"], ans: "A" },
                { q: "11. Heavy goods vehicles are not permitted here.", options: ["invited", "allowed", "needed"], ans: "B" },
                { q: "12. The buses follow the main routes into the city.", options: ["roads", "parks", "lights"], ans: "A" },
                { q: "13. More than three million passengers use the service each year.", options: ["drivers", "travellers", "workers"], ans: "B" },
                { q: "14. You may need to provide evidence of your journey.", options: ["proof", "map", "reason"], ans: "A" },
                { q: "15. The storytelling class helps people feel more confident.", options: ["calm", "friendly", "sure"], ans: "C" }
            ],
            ex2: [
                { s: "1. The museum has a new art [___] this month.", a: "exhibition" },
                { s: "2. Many plants and animals live together in an area with rich [___].", a: "biodiversity" },
                { s: "3. The police asked for [___] after the accident.", a: "evidence" },
                { s: "4. Tom feels more [___] after practising his speech many times.", a: "confident" },
                { s: "5. There was heavy traffic [___] in the city centre this morning.", a: "congestion" },
                { s: "6. Students can [___] many interesting facts during the science tour.", a: "discover" },
                { s: "7. The zoo offers a [___] tour for visitors every afternoon.", a: "guided" },
                { s: "8. The view from the mountain was absolutely [___].", a: "spectacular" },
                { s: "9. Bees [___] with flowers when collecting nectar.", a: "interact" },
                { s: "10. She does [___] work at the community café on weekends.", a: "voluntary" }
            ]
        },
        reading: {
            part1: {
                text: `<h3>Summer activities at London’s Kew Gardens</h3><p><strong>A.</strong> Climb up...</p><p><strong>B.</strong> The Nash...</p><p><strong>C.</strong> A world...</p><p><strong>D.</strong> An extraordinary...</p><p><strong>E.</strong> Come and see...</p>`, 
                questions: [
                    { q: "1. learning what all the different sections of a plant do", ans: "F" },
                    { q: "2. seeing art showing plants from a different part of the world", ans: "H" },
                    { q: "3. the possibility of having your work exhibited", ans: "E" },
                    { q: "4. learning about why human beings need plants", ans: "G" },
                    { q: "5. something that happens daily at the same times", ans: "D" },
                    { q: "6. learning about the relationship between various creatures, insects and plants", ans: "C" }
                ]
            },
            part2: {
                text: `<h3>City Park and Ride</h3><p>We have six...</p>`,
                questions: [
                    { q: "7. This was one of the first UK cities to introduce a Park and Ride scheme.", type: "TFNG", ans: "NOT GIVEN" },
                    { q: "8. The amount of congestion in the city centre has fallen.", type: "TFNG", ans: "TRUE" },
                    { q: "9. There is a special section of the car park for heavy goods vehicles.", type: "TFNG", ans: "FALSE" },
                    { q: "10. Bus drivers do not give change so you must have the correct money for a ticket.", type: "TFNG", ans: "FALSE" },
                    { q: "11. Ticket prices vary depending on the time of day.", type: "TFNG", ans: "TRUE" },
                    { q: "12. Children under 16 travelling alone are allowed free travel.", type: "TFNG", ans: "FALSE" },
                    { q: "13. The space for cycles, motorcycles and scooters is close to the site office.", type: "TFNG", ans: "NOT GIVEN" },
                    { q: "14. People with concessionary bus passes must pay the full fare to travel at certain times.", type: "TFNG", ans: "TRUE" }
                ]
            },
            part3: {
                text: `<h3>Local activities</h3><p><strong>A. Friends...</strong></p>`,
                questions: [
                    { q: "15. Susie has a teenage son...", ans: "E" },
                    { q: "16. Gareth is 21...", ans: "G" },
                    { q: "17. Marcia would like...", ans: "A" },
                    { q: "18. Ella is a new mum...", ans: "B" },
                    { q: "19. Jacob is looking...", ans: "C" }
                ]
            }
        }
    };

    let currentPart = 1;

    function loadVocab() {
        const ex1Cont = document.getElementById('vocab-ex1');
        data.vocab.ex1.forEach((item, idx) => {
            let html = `<div class="question-block"><p>${item.q}</p>`;
            item.options.forEach((opt, i) => {
                const letter = String.fromCharCode(65 + i);
                html += `<label><input type="radio" name="v1-${idx}" value="${letter}"> ${letter}. ${opt}</label> `;
            });
            ex1Cont.innerHTML += html + `</div>`;
        });

        const ex2Cont = document.getElementById('vocab-ex2-content');
        data.vocab.ex2.forEach((item, idx) => {
            const html = `<div class="question-block">${item.s.replace("[___]", `<input type="text" id="v2-${idx}" placeholder="...">`)}</div>`;
            ex2Cont.innerHTML += html;
        });
    }

    function gradeVocab() {
        let vScore = 0;
        data.vocab.ex1.forEach((item, idx) => {
            const selected = document.querySelector(`input[name="v1-${idx}"]:checked`);
            const parent = document.querySelectorAll(`input[name="v1-${idx}"]`)[0]?.closest('.question-block');
            if (selected) {
                if (selected.value === item.ans) vScore++;
                else {
                    parent.classList.add('wrong-answer');
                    if(!parent.querySelector('.ans-hint')) parent.insertAdjacentHTML('beforeend', `<span class="ans-hint">Correct: ${item.ans}</span>`);
                }
            }
        });
        data.vocab.ex2.forEach((item, idx) => {
            const el = document.getElementById(`v2-${idx}`);
            const val = el.value.trim().toLowerCase();
            if (val === item.a.toLowerCase()) {
                el.classList.add('correct-answer');
                vScore++;
            } else {
                el.classList.add('wrong-answer');
                if(!el.nextSibling) el.insertAdjacentHTML('afterend', `<span class="ans-hint">(${item.a})</span>`);
            }
        });

        const result = document.getElementById('vocab-score-display');
        result.innerHTML = `Vocab Score: ${vScore} / 25`;
        result.classList.remove('hidden');
        sendDataToSheet("Vocabulary Preview", vScore + "/25");
    }

    function gradeReading() {
        let rScore = 0;
        let totalQ = 19;
        [1, 2, 3].forEach(p => {
            data.reading[`part${p}`].questions.forEach((item, idx) => {
                const el = document.getElementById(`r${p}-${idx}`);
                if (el) {
                    const val = el.value.trim().toUpperCase();
                    if (val === item.ans) {
                        el.classList.add('correct-answer');
                        rScore++;
                    } else {
                        el.classList.add('wrong-answer');
                        if (!el.nextSibling) el.insertAdjacentHTML('afterend', `<span class="ans-hint">(${item.ans})</span>`);
                    }
                }
            });
        });

        const result = document.getElementById('reading-score-display');
        result.innerHTML = `Reading Score: ${rScore} / ${totalQ}`;
        result.classList.remove('hidden');
        sendDataToSheet(taskTitle, rScore + "/" + totalQ);
    }

    function sendDataToSheet(type, finalScore) {
        fetch(webAppUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                name: studentName,
                className: className,
                task: type,
                score: finalScore
            })
        }).then(() => console.log("Score sent for " + type));
    }

    function showReading() {
        document.getElementById('vocab-page').classList.add('hidden');
        document.getElementById('reading-page').classList.remove('hidden');
        showPart(1);
    }

    function showVocab() {
        document.getElementById('reading-page').classList.add('hidden');
        document.getElementById('vocab-page').classList.remove('hidden');
    }

    function showPart(n) {
        currentPart = n;
        const left = document.getElementById('reading-content');
        const right = document.getElementById('reading-questions');
        const part = data.reading[`part${n}`];
        left.innerHTML = part.text;
        let qHtml = `<h3>Questions Part ${n}</h3>`;
        part.questions.forEach((item, idx) => {
            qHtml += `<div class="question-block"><p>${item.q}</p>`;
            if (item.type === "TFNG") {
                qHtml += `<select id="r${n}-${idx}"><option value="">...</option><option value="TRUE">TRUE</option><option value="FALSE">FALSE</option><option value="NOT GIVEN">NOT GIVEN</option></select>`;
            } else {
                qHtml += `<input type="text" id="r${n}-${idx}" style="width: 40px" maxlength="1"> (A-H)`;
            }
            qHtml += `</div>`;
        });
        right.innerHTML = qHtml;
    }

    function nextPart() { if (currentPart < 3) showPart(currentPart + 1); }
    function prevPart() { if (currentPart > 1) showPart(currentPart - 1); }

    loadVocab();
</script>
